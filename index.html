<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KIS 주식 정보 조회</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Toast UI Grid CDN -->
    <link rel="stylesheet" href="https://uicdn.toast.com/tui-grid/latest/tui-grid.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ag-grid/31.0.0/ag-grid.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ag-grid/31.0.0/styles/ag-theme-alpine.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ag-grid/31.0.0/ag-grid-community.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tui-grid@4.21.0/dist/tui-grid.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 18px 16px 104px;
        }
        .card {
            width: 100%;
            max-width: 420px;
            background: transparent;
            border: 0;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
        }
        h1 {
            margin: 0;
            font-size: 18px;
            line-height: 1.2;
            font-weight: 800;
        }
        p {
            margin: 4px 0 0;
            color: #94a3b8;
            font-size: 13px;
        }
        .row {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
        }
        input {
            flex: 1;
            min-width: 0;
            padding: 14px 16px;
            border-radius: 18px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 15px;
            outline: none;
        }
        button {
            padding: 14px 18px;
            border: 0;
            border-radius: 18px;
            background: #10b981;
            color: #052e16;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .label { color: #94a3b8; font-size: 14px; }
        .value { font-size: 19px; font-weight: 800; margin-top: 8px; line-height: 1.3; }
        .error { color: #fca5a5; }
        .section-title {
            margin: 0 0 14px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
        }
        .hint {
            margin-top: 10px;
            color: #94a3b8;
            font-size: 12px;
            line-height: 1.5;
        }
        .results-list {
            margin-top: 14px;
            display: grid;
            gap: 8px;
            max-height: 180px;
            overflow-y: auto;
        }
        
         .results-grid {
            margin-top: 14px;
            height: 200px;
        }
        
        .results-grid.ag-theme-alpine {
            border: 1px solid #1f2937;
            border-radius: 8px;
            background: #0b1220;
            overflow: hidden;
        }
        
        .results-grid.ag-theme-alpine .ag-root-wrapper {
            overflow-x: hidden !important;
            overflow-y: auto !important;
        }
        
        .results-grid.ag-theme-alpine .ag-body-viewport {
            overflow-x: hidden !important;
        }
        
        .results-grid.ag-theme-alpine .ag-center-cols-viewport {
            overflow-x: hidden !important;
        }
        
        .results-grid.ag-theme-alpine .ag-body-horizontal-scroll-viewport {
            display: none !important;
        }
        
        .results-grid.ag-theme-alpine .ag-horizontal-scroll {
            display: none !important;
        }
        
        /* 웹킷 기반 브라우저 스크롤바 숨기기 */
        .results-grid.ag-theme-alpine::-webkit-scrollbar {
            display: none !important;
        }
        
        .results-grid.ag-theme-alpine .ag-root-wrapper::-webkit-scrollbar {
            display: none !important;
        }
        
        .results-grid.ag-theme-alpine .ag-body-viewport::-webkit-scrollbar {
            display: none !important;
        }
        
        /* 파이어폭스 스크롤바 숨기기 */
        .results-grid.ag-theme-alpine {
            scrollbar-width: none !important;
        }
        
        .results-grid.ag-theme-alpine .ag-root-wrapper {
            scrollbar-width: none !important;
        }
        
        .results-grid.ag-theme-alpine .ag-body-viewport {
            scrollbar-width: none !important;
        }
        
        .results-grid.ag-theme-alpine .ag-header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }
        
        .results-grid.ag-theme-alpine .ag-header-cell {
            background: #1e293b;
            color: #e2e8f0;
            font-weight: 600;
            border-right: 1px solid #334155;
            font-size: 13px;
        }
        
        .results-grid.ag-theme-alpine .ag-header-cell-text {
            color: #e2e8f0;
        }
        
        .results-grid.ag-theme-alpine .ag-row {
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
            cursor: pointer;
        }
        
        .results-grid.ag-theme-alpine .ag-row:hover {
            background: #1e293b !important;
        }
        
        .results-grid.ag-theme-alpine .ag-cell {
            color: #e2e8f0;
            border-right: 1px solid #1f2937;
            padding: 6px 8px;
            font-size: 13px;
        }
        
        .results-grid.ag-theme-alpine .ag-cell-value {
            color: #e2e8f0;
        }
        .result-item {
            padding: 12px 14px;
            border: 1px solid #334155;
            border-radius: 16px;
            background: #0f172a;
            cursor: pointer;
        }
        .result-item:hover {
            background: #162033;
            border-color: #475569;
        }
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 26px;
        }
        .chart-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .chart-label {
            color: #cbd5e1;
            font-size: 14px;
            font-weight: 700;
        }
        .chart-box {
            margin-top: 16px;
            padding: 16px;
            border-radius: 14px;
            background: #0b1220;
            border: 1px solid #1f2937;
        }
        #investorChart {
            width: 100%;
            max-height: 360px;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.72);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 1000;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-content {
            width: 100%;
            max-width: 820px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
        }
        .intraday-modal-content {
            max-width: min(1400px, 96vw);
            width: 96vw;
            height: min(88vh, 980px);
            display: flex;
            flex-direction: column;
        }
        .intraday-chart-box {
            flex: 1;
            min-height: 0;
        }
        #intradayChart {
            width: 100%;
            min-height: 620px;
            height: 100%;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: #e2e8f0;
        }
        .close-button {
            background: #f87171;
            color: #450a0a;
        }
        .trend-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }
        .trend-card {
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .trend-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.25);
            border-color: #334155;
        }
        .trend-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid #1f2937;
        }
        .trend-date {
            font-size: 16px;
            font-weight: 700;
            color: #f8fafc;
        }
        .trend-symbol {
            font-size: 12px;
            color: #94a3b8;
        }
        .trend-metrics {
            display: grid;
            gap: 10px;
        }
        .trend-metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .trend-metric-label {
            font-size: 13px;
            color: #cbd5e1;
        }
        .trend-metric-value {
            font-size: 14px;
            font-weight: 700;
            text-align: right;
        }
        .positive {
            color: #f87171;
        }
        .negative {
            color: #60a5fa;
        }
        .grid-container {
            margin-top: 0;
            background: #1e293b;
            border: 1px solid rgba(71, 85, 105, 0.55);
            border-radius: 28px;
            padding: 0;
            overflow: hidden;
        }
        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0;
            padding: 18px 18px 14px;
            border-bottom: 1px solid rgba(71, 85, 105, 0.45);
        }
        .grid-title {
            font-size: 16px;
            font-weight: 700;
            color: #e2e8f0;
        }
        .export-button {
            background: #0f172a;
            color: #10b981;
            font-weight: 700;
            padding: 10px 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 12px;
        }
        .export-button:hover {
            background: #162033;
        }
        .export-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        /* Toast UI Grid 다크 테마 */
        .tui-grid {
            background: #0b1220 !important;
            color: #e2e8f0 !important;
        }
        .tui-grid .tui-grid-header-area {
            background: #1f2937 !important;
            border-bottom: 1px solid #334155 !important;
        }
        .tui-grid .tui-grid-header-area th {
            background: #1f2937 !important;
            color: #e2e8f0 !important;
            border-right: 1px solid #334155 !important;
        }
        .tui-grid .tui-grid-body-area .tui-grid-row:hover {
            background: rgba(51, 65, 85, 0.3) !important;
        }
        .tui-grid .tui-grid-body-area td {
            border-right: 1px solid #334155 !important;
            border-bottom: 1px solid #334155 !important;
        }
        .tui-grid .plain-number-cell {
            color: #e2e8f0 !important;
        }
        .tui-grid .signed-number-cell {
            color: #e2e8f0 !important;
            font-weight: 700;
        }
        /* 하단 메뉴바 스타일 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.96);
            border-top: 1px solid rgba(51, 65, 85, 0.8);
            display: flex;
            justify-content: center;
            z-index: 100;
            padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
            backdrop-filter: blur(14px);
        }
        .nav-item {
            min-width: 120px;
            padding: 8px 18px;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .nav-item:hover {
            color: #e2e8f0;
            background: rgba(51, 65, 85, 0.5);
        }
        .nav-item.active {
            color: #22c55e;
            background: rgba(34, 197, 94, 0.15);
        }
        /* 탭 컨텐츠 스타일 */
        .tab-content {
            display: none !important;
        }
        .tab-content.active {
            display: block !important;
        }
        .detail-tabs {
            display: flex;
            gap: 8px;
            margin: 18px 0 12px;
        }
        .detail-tab {
            padding: 8px 14px;
            border: 1px solid #334155;
            border-radius: 999px;
            background: #0f172a;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .detail-tab.active {
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.5);
            background: rgba(34, 197, 94, 0.12);
        }
        .detail-tab.hidden {
            display: none;
        }
        .detail-panel {
            display: none;
        }
        .detail-panel.active {
            display: block;
        }
        /* 메인 컨텐츠 영역에 하단 여백 추가 (메뉴바 높이) */
        .app-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 6px 18px;
        }
        .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            background: linear-gradient(180deg, #22c55e, #10b981);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 14px 28px rgba(16, 185, 129, 0.18);
            flex-shrink: 0;
        }
        .brand-icon svg {
            width: 22px;
            height: 22px;
            stroke: #0f172a;
        }
        .panel {
            background: #1e293b;
            border: 1px solid rgba(71, 85, 105, 0.55);
            border-radius: 28px;
            padding: 22px;
            box-shadow: 0 22px 40px rgba(2, 6, 23, 0.22);
        }
        .grid-body {
            padding: 0 0 10px;
        }
        #grid,
        #etfGrid {
            width: 100%;
            height: 400px;
        }
        
        /* AG Grid 스타일 */
        .ag-theme-alpine {
            border: 1px solid #1f2937;
            border-radius: 8px;
            background: #0b1220;
        }
        
        .ag-theme-alpine .ag-header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }
        
        .ag-theme-alpine .ag-header-cell {
            background: #1e293b;
            color: #e2e8f0;
            font-weight: 600;
            border-right: 1px solid #334155;
        }
        
        .ag-theme-alpine .ag-header-cell-text {
            color: #e2e8f0;
        }
        
        .ag-theme-alpine .ag-row {
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
        }
        
        .ag-theme-alpine .ag-row-even {
            background: #0b1220;
        }
        
        .ag-theme-alpine .ag-row:hover {
            background: #1e293b !important;
        }
        
        .ag-theme-alpine .ag-cell {
            color: #e2e8f0;
            border-right: 1px solid #1f2937;
            padding: 8px 12px;
        }
        
        .ag-theme-alpine .ag-cell-value {
            color: #e2e8f0;
        }
        
        .ag-theme-alpine .ag-cell-right-aligned {
            text-align: right;
        }
        
        .ag-theme-alpine .ag-cell-center-aligned {
            text-align: center;
        }
        
        .ag-theme-alpine .ag-root-wrapper {
            background: #0b1220;
            border: 1px solid #1f2937;
        }
        
        .ag-theme-alpine .ag-body-viewport {
            background: #0f172a;
        }
        
        .ag-theme-alpine .ag-pinned-left-header {
            background: #1e293b;
        }
        
        .ag-theme-alpine .ag-pinned-right-header {
            background: #1e293b;
        }
        .nav-icon {
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .nav-icon svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
        }
        @media (max-width: 480px) {
            .status-actions {
                flex-wrap: nowrap;
            }
            .grid-title {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="app-header">
            <div class="brand-icon">
                <svg fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 4v16h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.3"></path>
                    <path d="M8 14l3-3 3 2 4-5" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.3"></path>
                </svg>
            </div>
            <div>
                <h1>Insight Stock</h1>
                <p>Real-time KIS Data Engine</p>
            </div>
        </div>
        <!-- 주식 조회 탭 -->
        <div id="stockTab" class="tab-content active">
            <div class="panel">
                <div class="section-title">종목 검색</div>
                <div class="row">
                    <input id="stockName" type="text" placeholder="종목명 검색 (예: 삼성전자)" maxlength="50" />
                    <button id="searchButton">검색</button>
                </div>
                <div id="searchResults" class="results-grid"></div>
            </div>
            <div class="detail-tabs">
                <button id="trendDetailTab" class="detail-tab active" type="button">일자별 투자자 매매동향</button>
                <button id="etfDetailTab" class="detail-tab hidden" type="button">ETF 구성종목</button>
            </div>
            <div id="trendDetailPanel" class="detail-panel active">
                <div id="trendTableContainer" class="grid-container">
                    <div class="grid-header">
                        <div class="grid-title">일자별 투자자 매매동향</div>
                        <div style="display: flex; gap: 8px;">
                            <button id="intradayBtn" class="export-button" style="color: #0ea5e9;" disabled>당일 흐름</button>
                            <button id="exportBtn" class="export-button" disabled>CSV</button>
                        </div>
                    </div>
                    <div class="grid-body">
                        <div id="grid" style="height: 380px;"></div>
                    </div>
                </div>
            </div>
            <div id="etfDetailPanel" class="detail-panel">
                <div id="etfContainer" class="grid-container">
                    <div class="grid-header">
                        <div class="grid-title">ETF 구성종목 및 편입비중</div>
                        <button id="etfExportBtn" class="export-button" disabled>CSV</button>
                    </div>
                    <div class="grid-body">
                        <div id="etfGrid" style="height: 400px;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="myTab" class="tab-content">
            <div class="panel">
                <div class="section-title">My</div>
                <div style="color: #94a3b8;">준비 중입니다.</div>
            </div>
        </div>
    </div>

    <!-- 하단 메뉴바 -->
    <div class="bottom-nav">
        <div class="nav-item active" data-tab="stockTab">
            <span class="nav-icon">
                <svg fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect height="18" rx="2" width="18" x="3" y="3"></rect><path d="M3 9h18"></path><path d="M9 21V9"></path></svg>
            </span>
            <span>주식</span>
        </div>
        <div class="nav-item" data-tab="myTab">
            <span class="nav-icon">
                <svg fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"></path><path d="M4 20a8 8 0 1 1 16 0"></path></svg>
            </span>
            <span>My</span>
        </div>
    </div>

    <div id="chartModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div id="chartModalTitle" class="modal-title">투자자별 거래 그래프</div>
                <button id="closeChartModalButton" class="close-button">닫기</button>
            </div>
            <div class="chart-box" style="margin-top:0;">
                <canvas id="investorChart"></canvas>
            </div>
        </div>
    </div>

    <div id="intradayModal" class="modal-overlay">
        <div class="modal-content intraday-modal-content">
            <div class="modal-header">
                <div id="intradayModalTitle" class="modal-title">당일 시간대별 누적 순매수 흐름</div>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <button id="downloadDbCsvBtn" class="export-button" style="background: #a78bfa; color: #1e1b4b;" disabled>DB 저장용 CSV 다운로드</button>
                    <button id="closeIntradayModalButton" class="close-button">닫기</button>
                </div>
            </div>
            <div class="chart-box intraday-chart-box" style="margin-top:0;">
                <canvas id="intradayChart"></canvas>
            </div>
        </div>
    </div>
    


    <script>
        const stockNameInput = document.getElementById('stockName');
        const searchButton = document.getElementById('searchButton');
        const searchResults = document.getElementById('searchResults');
        const trendTableContainer = document.getElementById('trendTableContainer');
        const exportBtn = document.getElementById('exportBtn');
        const chartModal = document.getElementById('chartModal');
        const chartModalTitle = document.getElementById('chartModalTitle');
        const closeChartModalButton = document.getElementById('closeChartModalButton');
        const investorChartCanvas = document.getElementById('investorChart');
        const intradayBtn = document.getElementById('intradayBtn');
        const intradayModal = document.getElementById('intradayModal');
        const intradayModalTitle = document.getElementById('intradayModalTitle');
        const closeIntradayModalButton = document.getElementById('closeIntradayModalButton');

            trendDetailPanel.classList.toggle('active', !showEtf);

                    etfGrid.api.refreshCells();
                    etfGrid.api.sizeColumnsToFit();
                }
                if (!showEtf && grid && grid.api) {

                }

        function updateEtfDetailVisibility() {
            const isEtf = currentInstrumentMarket === 'ETF' && !!currentEtfSymbol;
            etfDetailTab.classList.toggle('hidden', !isEtf);
            if (!isEtf) {
                setDetailTab('trend');
                if (etfGrid && etfGrid.api) {
                    etfGrid.api.setGridOption('rowData', []);
                }
                etfExportBtn.disabled = true;
            }

        async function fetchEtfConstituents() {
            const symbol = currentEtfSymbol;
            if (!symbol) {
                return;
            }

            etfExportBtn.disabled = true;

            try {
                const response = await fetch(`/api/etf-constituents?symbol=${encodeURIComponent(symbol)}`);
                const data = await response.json();
                
                if (!response.ok || data.error) {
                    throw new Error(data.error || 'ETF 구성종목 조회에 실패했습니다.');
                }

                if (!data.data || data.data.length === 0) {
                    if (etfGrid && etfGrid.api) {
                        etfGrid.api.setGridOption('rowData', []);
                    }
                    return;
                }

                // 편입비중 내림차순으로 정렬하여 표시
                const sortedData = data.data.sort((a, b) => (b.weight || 0) - (a.weight || 0));
                
                if (etfGrid && etfGrid.api) {
                    etfGrid.api.setGridOption('rowData', sortedData);
                    setTimeout(() => {
                        etfGrid.api.sizeColumnsToFit();
                    }, 100);
                    etfExportBtn.disabled = false;
                }

                console.log(`ETF ${symbol} 구성종목 ${data.count}개 로드 완료`);
            } catch (error) {
                console.error('Error fetching ETF constituents:', error);
                if (etfGrid && etfGrid.api) {
                    etfGrid.api.setGridOption('rowData', []);
                }
                alert(error.message);
            }
        }

                return;

        function normalizeTrendDate(value) {
            if (!value) {
                return '';
            }
            const text = String(value).trim();
            if (/^\d{8}$/.test(text)) {
                return `${text.slice(0, 4)}-${text.slice(4, 6)}-${text.slice(6, 8)}`;
            }
            return text.slice(0, 10);
        }

        function renderTrendTable(rows) {
            console.log('renderTrendTable called with rows:', rows.length);
            console.log('Sample row data:', rows[0]);
            
            if (!grid) {
                console.log('Grid not initialized, initializing now...');
                initializeGrid();
            }
            
            if (!rows.length) {
                console.log('No rows to display');
                if (grid && grid.api) {
                    grid.api.setGridOption('rowData', []);
                }
                exportBtn.disabled = true;
                return;
            }
            
            // 종가 데이터가 없으면 기본값 추가
            const processedRows = rows.map((row, index) => ({
                ...row,
                normalized_date: normalizeTrendDate(row.date),
                close_price: row.close_price || 0,
                volume: row.volume || 0,
            }));
            
            console.log('Setting AG Grid data with', processedRows.length, 'rows');
            console.log('Grid object:', grid);
            console.log('Grid API:', grid ? grid.api : 'undefined');
            
            try {
                if (grid && grid.api) {
                    grid.api.setGridOption('rowData', processedRows);
                    setTimeout(() => {
                        grid.api.sizeColumnsToFit();
                    }, 100);
                    exportBtn.disabled = false;

            console.log('Fetching investor trend for symbol:', targetSymbol);
            const response = await fetch(`/api/investor-trend?symbol=${encodeURIComponent(targetSymbol)}`);

            const data = await response.json();

                throw new Error(data.detail || '투자자 동향 조회에 실패했습니다.');

        async function fetchIntradayData() {
            // 현재 선택된 종목의 symbol을 가져옴
            const symbol = currentSymbol || '';
            if (!symbol) {
                alert('종목을 먼저 선택해주세요.');
                return;
            }
            intradayBtn.disabled = true;
            downloadDbCsvBtn.disabled = true;
            currentIntradayRows = [];
            currentIntradaySymbol = symbol;
            intradayModalTitle.textContent = `${symbol} 당일 누적 순매수 흐름`;
            intradayModal.classList.add('open');

            try {
                const response = await fetch(`/api/investor-intraday?symbol=${encodeURIComponent(symbol)}`);
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || '시간대별 동향 조회에 실패했습니다.');
                }
                currentIntradayRows = data.data || [];
                renderIntradayChart(currentIntradayRows);
                downloadDbCsvBtn.disabled = currentIntradayRows.length === 0;
            } catch (error) {
                console.error('Error fetching intraday data:', error);
                const ctx = intradayChartCanvas.getContext('2d');
                ctx.clearRect(0, 0, intradayChartCanvas.width, intradayChartCanvas.height);
                ctx.fillStyle = '#94a3b8';
                ctx.font = '16px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('데이터를 불러올 수 없습니다.', intradayChartCanvas.width / 2, intradayChartCanvas.height / 2);
            } finally {
                intradayBtn.disabled = false;
            }
        }

        function downloadDbCsv() {
            if (!currentIntradayRows.length || !currentIntradaySymbol) {
                return;
            }
            const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            const header = 'symbol,date,time,personal_net_buy,foreign_net_buy,institution_net_buy';
            const rows = currentIntradayRows.map(row =>
                `${currentIntradaySymbol},${today},${row.time || ''},${row.personal_net_buy || 0},${row.foreign_net_buy || 0},${row.institution_net_buy || 0}`
            );
            const csvContent = [header, ...rows].join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentIntradaySymbol}_investor_data.csv`;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function renderIntradayChart(rows) {
            if (intradayChart) {
                intradayChart.destroy();
                intradayChart = null;
            }
            if (!rows.length) {
                return;
            }

            const labels = rows.map(r => r.time);
            const personalData = rows.map(r => r.personal_net_buy || 0);
            const foreignData = rows.map(r => r.foreign_net_buy || 0);
            const institutionData = rows.map(r => r.institution_net_buy || 0);

            intradayChart = new Chart(intradayChartCanvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '개인',
                            data: personalData,
                            borderColor: '#22c55e',
                            backgroundColor: 'rgba(34, 197, 94, 0.15)',
                            borderWidth: 2,
                            tension: 0.3,
                            pointRadius: 3,
                            pointHoverRadius: 6,
                            fill: true,
                        },
                        {
                            label: '외국인',
                            data: foreignData,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.15)',
                            borderWidth: 2,
                            tension: 0.3,
                            pointRadius: 3,
                            pointHoverRadius: 6,
                            fill: true,
                        },
                        {
                            label: '기관',
                            data: institutionData,
                            borderColor: '#ef4444',
                            backgroundColor: 'rgba(239, 68, 68, 0.15)',
                            borderWidth: 2,
                            tension: 0.3,
                            pointRadius: 3,
                            pointHoverRadius: 6,
                            fill: true,
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            labels: {
                                color: '#e2e8f0',
                                font: { size: 13 },
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.dataset.label}: ${Number(context.raw).toLocaleString('ko-KR')}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: '시간',
                                color: '#94a3b8',
                            },
                            ticks: { color: '#94a3b8' },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' },
                        },
                        y: {
                            title: {
                                display: true,
                                text: '누적 순매수량',
                                color: '#94a3b8',
                            },
                            ticks: {
                                color: '#94a3b8',
                                callback: function(value) {
                                    return Number(value).toLocaleString('ko-KR');
                                }
                            },
                            grid: { color: 'rgba(148, 163, 184, 0.1)' },
                        }
                    }
                }
            });
        }

        searchButton.addEventListener('click', searchStockByName);
        exportBtn.addEventListener('click', downloadCsv);
        intradayBtn.addEventListener('click', fetchIntradayData);
        downloadDbCsvBtn.addEventListener('click', downloadDbCsv);
        closeChartModalButton.addEventListener('click', closeChartModal);
        closeIntradayModalButton.addEventListener('click', closeIntradayModal);
        
        // ETF 이벤트 리스너
        etfExportBtn.addEventListener('click', downloadEtfCsv);
        trendDetailTab.addEventListener('click', () => setDetailTab('trend'));
        etfDetailTab.addEventListener('click', () => {
            if (!etfDetailTab.classList.contains('hidden')) {
                setDetailTab('etf');
            }
        });
        
        // 탭 전환 기능
        function switchTab(tabId) {
            console.log('Switching to tab:', tabId);
            
            // 모든 탭 컨텐츠 숨기기
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
                console.log('Removed active from tab:', tab.id);
            });
            // 모든 네비게이션 아이템 비활성화
            document.querySelectorAll('.nav-item').forEach(nav => {
                nav.classList.remove('active');
                console.log('Removed active from nav:', nav.getAttribute('data-tab'));
            });
            
            // 선택한 탭 표시
            const selectedTab = document.getElementById(tabId);
            if (selectedTab) {
                selectedTab.classList.add('active');
                console.log('Added active to tab:', tabId);
            } else {
                console.error('Tab not found:', tabId);
                return;
            }
            
            // 선택한 네비게이션 활성화
            const selectedNav = document.querySelector(`.nav-item[data-tab="${tabId}"]`);
            if (selectedNav) {
                selectedNav.classList.add('active');
                console.log('Added active to nav:', tabId);
            } else {
                console.error('Nav item not found:', tabId);
            }
            
            // 탭 전환 시 그리드 레이아웃 새로고침
            setTimeout(() => {
                if (grid) {
                    grid.api.refreshCells();
                }
                if (etfGrid) {
                    etfGrid.api.refreshCells();
                }
                if (searchGrid) {
                    searchGrid.api.refreshCells();
                }
                console.log('Grid layouts refreshed after tab switch');
            }, 50);
        }
        
        // 네비게이션 클릭 이벤트
        document.querySelectorAll('.nav-item').forEach(navItem => {
            console.log('Setting up nav item:', navItem.getAttribute('data-tab'));
            navItem.addEventListener('click', (event) => {
                console.log('Nav item clicked:', navItem.getAttribute('data-tab'));
                const tabId = navItem.getAttribute('data-tab');
                switchTab(tabId);
            });
        });
        
        chartModal.addEventListener('click', (event) => {
            if (event.target === chartModal) {
                closeChartModal();
            }
        });
        intradayModal.addEventListener('click', (event) => {
            if (event.target === intradayModal) {
                closeIntradayModal();
            }
        });
        stockNameInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                searchStockByName();
            }
        });
        
        // 페이지 로드 시 그리드 초기화
        document.addEventListener('DOMContentLoaded', () => {
            initializeGrid();
            initializeEtfGrid();
            initializeSearchGrids();
        });
    </script>
</body>
</html>
